<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Medicare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Back Link -->
        <a href="index.html"
            class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-blue-600 mb-8 transition">
            <i class="fas fa-arrow-left mr-2"></i> Back to Home
        </a>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8 sm:p-10 space-y-8">
            <div class="text-center">
                <div
                    class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200">
                    <i class="fas fa-user-shield text-white text-3xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900">Admin Portal</h2>
                <p class="mt-2 text-sm font-medium text-slate-500">M. I. P. Premawardhana | Medicare</p>
            </div>

            <form class="mt-8 space-y-6" id="loginForm">
                <div id="errorMsg"
                    class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium flex items-center border border-red-100">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span>Invalid credentials. Please try again.</span>
                </div>

                <div class="space-y-4">
                    <div>
                        <label for="username" class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-user text-slate-400"></i>
                            </div>
                            <input id="username" name="username" type="text" required
                                class="appearance-none rounded-xl relative block w-full px-4 py-3.5 pl-11 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm font-medium transition bg-slate-50 focus:bg-white"
                                placeholder="Enter username">
                        </div>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400"></i>
                            </div>
                            <input id="password" name="password" type="password" required
                                class="appearance-none rounded-xl relative block w-full px-4 py-3.5 pl-11 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm font-medium transition bg-slate-50 focus:bg-white"
                                placeholder="Enter password">
                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
                        Secure Sign In
                    </button>
                </div>
            </form>
        </div>

        <p class="mt-8 text-center text-sm text-slate-500 font-medium">
            &copy; 2026 Medicare System. All rights reserved.
        </p>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
